<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ page_description }}" />
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="scroll-progress" id="scrollProgress"></div>

    <nav class="navbar">
      <a class="brand" href="{{ url_for('home') }}#home">Muhammad Ali Tahirzadeh</a>

      <div class="nav-links">
        <a href="{{ url_for('home') }}#home">Ana Səhifə</a>
        <a href="{{ url_for('home') }}#about">Haqqımda</a>
        <a href="{{ url_for('home') }}#skills">Bacarıqlar</a>
        <a href="{{ url_for('home') }}#education">Təhsil</a>
        <a href="{{ url_for('home') }}#projects">Layihələrim</a>
      </div>

      <div class="nav-actions">
        <a href="{{ url_for('home') }}#contact" class="contact-btn">Əlaqə</a>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch theme">🌙</button>
        <button class="nav-toggle" id="navToggle" type="button" aria-label="Toggle navigation">☰</button>
      </div>
    </nav>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
