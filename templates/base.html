<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ page_description }}" />
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="scroll-progress" id="scrollProgress"></div>

    <nav class="navbar" id="navbar">
      <a class="brand" href="{{ url_for('home') }}#home">Muhammad Ali Tahirzadeh</a>

      <div class="nav-links">
        <a href="{{ url_for('home') }}#home">Home</a>
        <a href="{{ url_for('home') }}#about">About</a>
        <a href="{{ url_for('home') }}#skills">Skills</a>
        <a href="{{ url_for('home') }}#education">Education</a>
        <a href="{{ url_for('home') }}#projects">Projects</a>
        <a href="{{ url_for('home') }}#contact">Contact</a>
      </div>

      <div class="nav-actions">
        <a href="{{ url_for('home') }}#contact" class="contact-btn">Get in Touch</a>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch theme">🌙</button>
        <button class="nav-toggle" id="navToggle" type="button" aria-label="Toggle navigation">☰</button>
      </div>
    </nav>

    <main class="container">
      {% block content %}{% endblock %}
    </main>
